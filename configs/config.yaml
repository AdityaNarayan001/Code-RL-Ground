# Project Configuration
project:
  name: "code-rl-ground"
  description: "RL-based code learning environment"
  version: "0.1.0"

# Paths (all relative to project root)
paths:
  dataset: "./dataset"
  cache: "./cache"
  checkpoints: "./checkpoints"
  logs: "./logs"
  ui_build: "./ui/build"

# Model Configuration
model:
  name: "Qwen/Qwen2.5-7B-Instruct-1M"
  backend: "transformers"  # transformers for HuggingFace/PyTorch
  quantization: "none"  # auto, 4bit, 8bit, or none (4bit/8bit only on CUDA)
  device: "auto"  # auto, cuda, mps, or cpu
  max_context_length: 8192
  generation:
    # Sized to the dataset: largest expected change ~340 tokens (PR-010 full
    # decorators.py); worst-case whole-file write_file with syntax/escaping
    # overhead ~450. 768 leaves margin (truncated tool calls are unparseable
    # and poison the reward signal); the old 2048 made rollouts ~5x slower.
    max_new_tokens: 768
    temperature: 0.7
    top_p: 0.95
    do_sample: true

# RL Training Configuration
training:
  algorithm: "grpo"  # Only grpo is supported
  learning_rate: 1.0e-5
  max_episodes: 1000  # Global episode budget (safety valve)
  
  # GRPO specific (Group Relative Policy Optimization)
  grpo:
    group_size: 4  # Number of completions per prompt (>=4 recommended; <2 gives no group signal)
    beta: 0.1  # KL penalty coefficient
    clip_range: 0.2
    
  # LoRA configuration
  lora:
    enabled: true
    r: 32
    alpha: 64
    dropout: 0.05
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

  # Checkpointing
  checkpointing:
    enabled: true
    save_every_n_steps: 100
    keep_last_n: 3  # Delete older checkpoints, keep only latest 3
    save_optimizer: true
    save_scheduler: true

# Environment Configuration  
environment:
  mode: "multi_turn"  # single_turn or multi_turn
  max_turns: 5  # max turns per episode for multi-turn
  timeout_seconds: 60
  
  # Sandbox configuration (Python subprocess)
  sandbox:
    enabled: true
    backend: "subprocess"  # subprocess (Python), docker (future)
    timeout_per_execution: 30  # seconds
    max_memory_mb: 512
    allowed_imports: ["os", "sys", "re", "json", "math", "collections", "itertools", "functools", "pathlib", "typing", "time"]
  
  # Tool configuration (Option C - agent with tools)
  tools:
    enabled: true
    available:
      - read_file
      - write_file
      - edit_file
      - list_directory
      - run_python
      - search_code
      - submit

  # Multi-turn feedback configuration
  multi_turn_feedback:
    show_correct_incorrect: true      # Just "correct/incorrect" signal
    show_error_messages: true         # Detailed error messages (syntax, runtime)
    show_partial_reward: true         # Show partial reward signal (0.0 - 1.0)
    show_test_results: true           # Show which tests passed/failed
    show_diff_hints: false            # Show hints about what's different (can be too revealing)

# Reward Configuration
rewards:
  weights:
    syntax_valid: 0.1
    tests_pass: 0.5
    files_match: 0.1
    exact_match: 0.2
    import_check: 0.1
  
  # Partial credit settings
  partial_credit:
    enabled: true
    line_match_weight: 0.5
    function_match_weight: 0.5

# Curriculum Learning
curriculum:
  enabled: true
  strategy: "dependency"  # dependency (respects PR deps), difficulty, random, sequential
  respect_dependencies: true  # Always respect PR dependencies regardless of strategy
  
  # Strict progression: Must solve current PR before moving to next
  strict_progression: true
  solve_threshold: 0.9  # Reward threshold to consider PR "solved"
  min_consecutive_solves: 3  # Legacy consecutive-solve check (fallback)
  max_attempts_per_pr: 200  # Max attempts before forcing move (safety valve)
  mastery_window: 5  # Look at last K attempts for mastery check
  mastery_required: 3  # Require M successes within the window

# Data Augmentation
augmentation:
  enabled: true
  strategies:
    # NOTE: variable_renaming is intentionally NOT enabled: it rewrites the
    # expected_changes (grading target) without changing the PR description the
    # model sees, making files_match/exact_match unattainable on those variants.
    - docstring_variation   # Rephrase docstrings slightly
    - whitespace_variation  # Minor formatting changes
  multiplier: 3             # 3x more training examples per PR
  seed: 42                  # For reproducibility

# Mastery Evaluation
mastery:
  enabled: true
  eval_frequency: 500  # Run mastery eval every N steps
  full_eval_at_end: true  # Run full evaluation at training end
  
  # Mastery test: Can model recreate all PRs from scratch?
  test_config:
    num_attempts_per_pr: 5
    require_all_prs: true
    success_threshold_per_pr: 0.9  # 90% reward threshold to "pass"
    overall_success_threshold: 1.0  # ALL PRs must pass for mastery

# Championship Round (Final Test)
championship:
  enabled: true
  trigger: "all_prs_solved"  # Run only after all PRs solved in training
  mode: "sequential"  # Model does all PRs in sequence from base repo
  allow_retries: false  # No retries in championship
  save_transcript: true  # Save full transcript of championship attempt
  
# Model Saving
model_saving:
  save_final: true
  final_model_path: "./checkpoints/final_model"
  save_on_mastery: true  # Also save when mastery achieved

# Logging & Monitoring
logging:
  level: "INFO"
  save_generations: true
  save_every_n_steps: 100
  
  # WebSocket for real-time UI
  websocket:
    enabled: true
    host: "localhost"
    port: 8765

# UI Configuration
ui:
  enabled: true
  host: "localhost"
  port: 3000
  api_port: 8000
  refresh_rate_ms: 500

# Phased Training Configuration
phased_training:
  enabled: true
  start_phase: 1
  max_steps_per_phase: 500
  phases:
    1:
      name: "Code Completion"
      max_turns: 1
      group_size: 4
      tools: []
      advancement_threshold: 0.79
      advancement_window: 10
      advancement_required: 7
      pr_ids: ["PR-001", "PR-003"]
    2:
      name: "Tool Format"
      max_turns: 1
      group_size: 4
      tools: ["write_file"]
      advancement_threshold: 0.50
      advancement_window: 10
      advancement_required: 5
      pr_ids: ["PR-001", "PR-003"]
    3:
      name: "Read+Write"
      max_turns: 2
      group_size: 4
      tools: ["read_file", "write_file"]
      auto_submit_after_turn: 2
      advancement_threshold: 0.7
      advancement_window: 12
      advancement_required: 8
      pr_ids: ["PR-001", "PR-003", "PR-005", "PR-006"]
    4:
      name: "Tool Chain"
      max_turns: 5
      group_size: 4
      tools: ["read_file", "write_file", "edit_file", "list_directory", "submit"]
      advancement_threshold: 0.7
      advancement_window: 15
      advancement_required: 10
      pr_ids: ["PR-001", "PR-002", "PR-003", "PR-004", "PR-005", "PR-006", "PR-007", "PR-008"]
    5:
      name: "Full Curriculum"
      max_turns: 10
      group_size: 4
      tools: ["read_file", "write_file", "edit_file", "list_directory", "run_python", "search_code", "submit"]
      advancement_threshold: 0.9
      advancement_window: 20
      advancement_required: 16
      pr_ids: "all"
